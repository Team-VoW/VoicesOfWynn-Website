version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
      - "8443:443"
    environment:
      - WEBSITE_DB_HOST=website
      - WEBSITE_DB_NAME=website
      - WEBSITE_DB_USER=${DB_USER}
      - WEBSITE_DB_PASSWORD=${DB_PASSWORD}
      - API_DB_HOST=api
      - API_DB_NAME=api
      - API_DB_USER=${DB_USER}
      - API_DB_PASSWORD=${DB_PASSWORD}
      - LINE_REPORT_COLLECT=${LINE_REPORT_COLLECT}
      - LINE_REPORT_MODIFY=${LINE_REPORT_MODIFY}
      - STATISTICS_AGGREGATE=${STATISTICS_AGGREGATE}
      - DISCORD_INTEGRATION=${DISCORD_INTEGRATION}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - DEV_MODE=true
    depends_on:
      - website
      - api
      - adminer
      - vow-api

    env_file:
      - .env
    volumes:
      - .:/var/www/html
    dns: # Add this dns option
      - 8.8.8.8 # Use Google's public DNS server
      - 8.8.4.4 # (Optional) Secondary Google DNS server

  vow-api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /workspace
    command: dotnet run --no-launch-profile --project src/VoW.Api/VoW.Api.csproj --urls http://0.0.0.0:8080
    ports:
      - "5080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - WEBSITE_DB_HOST=website
      - WEBSITE_DB_NAME=website
      - API_DB_HOST=api
      - API_DB_NAME=api
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      - website
      - api
    env_file:
      - .env
    volumes:
      - ./vow-api:/workspace
      - vow_api_bin:/workspace/src/VoW.Api/bin
      - vow_api_obj:/workspace/src/VoW.Api/obj

  website:
    image: mariadb:10.5.24
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: website
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    expose:
      - "3306"
    volumes:
      - website_data:/var/lib/mysql
    env_file:
      - .env

  api:
    image: mariadb:10.5.24
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: api
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    expose:
      - "3306"
    volumes:
      - api_data:/var/lib/mysql
    env_file:
      - .env

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - website
      - api

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8090:8080"
    environment:
      - SWAGGER_JSON_URL=http://localhost:8000/api/swagger
    depends_on:
      - web

volumes:
  website_data:
  api_data:
  vow_api_bin:
  vow_api_obj:
